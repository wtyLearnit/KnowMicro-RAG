name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/socrates-window-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/socrates-window-frontend

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 创建 Release
      packages: write      # 推送到 GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
