version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowmicro-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - EMBED_API_BASE=${EMBED_API_BASE:-https://api.openai.com/v1}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS:-1536}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/system/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowmicro-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
